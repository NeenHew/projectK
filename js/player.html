<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player · Realtime Quiz</title>
    <link rel="stylesheet" href="./styles.css" />
    <meta name="color-scheme" content="dark" />
  </head>
  <body>
    <div class="app shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo">Q</div>
          <div class="brandText">
            <div class="brandName">Player</div>
            <div class="brandSub">Join with PIN · answer on phone</div>
          </div>
        </div>
        <a class="pillLink" href="./index.html">Home</a>
      </header>

      <main class="stack gapLg">
        <section id="joinCard" class="card stack gapMd">
          <h1>Join a room</h1>
          <div class="kv">
            <div class="muted">Name</div>
            <input id="nameInput" class="input" maxlength="18" placeholder="e.g. Phu" />
            <div class="muted">Room PIN</div>
            <input id="pinInput" class="input mono" inputmode="numeric" maxlength="6" placeholder="6-digit PIN" />
          </div>
          <button id="btnJoin" class="btn primary full">Join</button>
          <div class="muted" style="font-size:12px">
            Tip: if you scanned a QR code, the PIN will auto-fill.
          </div>
        </section>

        <section id="gameCard" class="card stack gapMd" style="display:none">
          <div class="row spaceBetween wrap gapMd">
            <div class="stack gapSm">
              <div class="row gapSm wrap">
                <span class="badge">PIN: <b id="roomPin" class="mono">------</b></span>
                <span class="badge">You: <b id="playerName">—</b></span>
                <span class="badge">Score: <b id="score">0</b></span>
              </div>
              <div class="questionText" id="questionText">Waiting for host…</div>
              <div class="row gapSm" style="align-items:center">
                <div class="timer"><span id="timeLeft">--</span>s</div>
                <div class="progressBar"><div id="progressFill" class="progressFill"></div></div>
              </div>
              <div class="muted" id="statusText">—</div>
            </div>
          </div>

          <div class="answersGrid" id="answersGrid">
            <!-- buttons inserted by JS -->
          </div>

          <div id="revealCard" class="card" style="padding:14px; display:none">
            <div class="row spaceBetween wrap gapMd">
              <div>
                <div class="muted">Correct answer</div>
                <div id="correctAnswer" style="font-weight:900; font-size:18px">—</div>
              </div>
              <div class="muted" id="resultText">—</div>
            </div>
          </div>
        </section>
      </main>

      <div id="toast" class="toast"></div>
    </div>

    <script type="module" src="./js/player.js"></script>
  </body>
</html>
